name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Sugerencia: Evita el aviso de depreciación de Node
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # <--- CORREGIDO: Antes decía upload-artifact

      - name: Install, build, and upload your site
        uses: withastro/action@v4
        with:
          path: .
          site: ./dist
          node-version: 22 # <--- ACTUALIZADO: Para evitar avisos de versión antigua

      - name: Add .nojekyll file
        run: echo "" > dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4 # Este es el correcto para Pages
        with:
          path: ./dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4